# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: autoheal-langgraph-agent
description: >
  LangGraph-based CI/CD auto-healing agent that diagnoses pipeline failures,
  updates the target repository through GitHub App credentials, and opens
  remediation pull requests.
metadata:
  authors:
    - Microsoft
    - OpenAI Codex
  tags:
    - Azure AI Foundry Hosted Agent
    - LangGraph
    - GitHub App
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: FOUNDRY_PROJECT_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}
  - name: FOUNDRY_MODEL_DEPLOYMENT_NAME
    value: ${FOUNDRY_MODEL_DEPLOYMENT_NAME}
  - name: GITHUB_APP_ID
    value: ${GITHUB_APP_ID}
  - name: GITHUB_APP_INSTALLATION_ID
    value: ${GITHUB_APP_INSTALLATION_ID}
  - name: GITHUB_APP_PRIVATE_KEY
    value: ${GITHUB_APP_PRIVATE_KEY}
  - name: GITHUB_REPO_OWNER
    value: ${GITHUB_REPO_OWNER}
  - name: GITHUB_REPO_NAME
    value: ${GITHUB_REPO_NAME}
  - name: USE_GITHUB_MCP
    value: ${USE_GITHUB_MCP:-false}
  - name: GITHUB_MCP_URL
    value: ${GITHUB_MCP_URL:-}
  - name: GITHUB_MCP_COMMAND
    value: ${GITHUB_MCP_COMMAND:-}
  - name: GITHUB_MCP_ARGS_JSON
    value: ${GITHUB_MCP_ARGS_JSON:-[]}
  - name: GITHUB_MCP_ENV_JSON
    value: ${GITHUB_MCP_ENV_JSON:-{}}
  - name: GITHUB_MCP_HEADERS_JSON
    value: ${GITHUB_MCP_HEADERS_JSON:-{}}
  - name: LOG_LEVEL
    value: ${LOG_LEVEL:-INFO}
resources:
  cpu: "1.0"
  memory: 2.0Gi
dockerfile_path: langgraph_agent/Dockerfile
