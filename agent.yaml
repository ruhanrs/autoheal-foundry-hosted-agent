# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
# dockerfile_path: Dockerfile

kind: hosted
name: foundrycicdagent
description: >
  CI/CD auto-healing agent that diagnoses pipeline failures and creates
  fix PRs on GitHub using the repository's code conventions.
metadata:
  authors:
    - Microsoft
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: FOUNDRY_PROJECT_ENDPOINT
    value: ${FOUNDRY_PROJECT_ENDPOINT}
  - name: FOUNDRY_MODEL_DEPLOYMENT_NAME
    value: ${FOUNDRY_MODEL_DEPLOYMENT_NAME}
  - name: GITHUB_REPO_OWNER
    value: ${GITHUB_REPO_OWNER}
  - name: GITHUB_REPO_NAME
    value: ${GITHUB_REPO_NAME}
  - name: GITHUB_MCP_CONNECTION_ID
    value: ${GITHUB_MCP_CONNECTION_ID}
  - name: GITHUB_MCP_SERVER_LABEL
    value: ${GITHUB_MCP_SERVER_LABEL:-github}
  - name: GITHUB_MCP_REQUIRE_APPROVAL
    value: ${GITHUB_MCP_REQUIRE_APPROVAL:-never}
  - name: GITHUB_MCP_ALLOWED_TOOLS_JSON
    value: ${GITHUB_MCP_ALLOWED_TOOLS_JSON:-[]}
  - name: PHASE1_TIMEOUT_SECONDS
    value: ${PHASE1_TIMEOUT_SECONDS:-120}
  - name: PHASE2_TIMEOUT_SECONDS
    value: ${PHASE2_TIMEOUT_SECONDS:-180}
  - name: AGENT_MAX_RETRIES
    value: ${AGENT_MAX_RETRIES:-2}
  - name: LOG_LEVEL
    value: ${LOG_LEVEL:-INFO}
resources:
  cpu: '1.0'
  memory: 2.0Gi
dockerfile_path: Dockerfile
