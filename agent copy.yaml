# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: auto-heal-agent
description: >
  Auto-Healing CI/CD Agent. Reads pipeline failure logs and a TECHNOLOGY
  CONTEXT block, then creates or updates an `autoheal-<stack>/<branch>`
  branch + PR with a minimal fix. GitHub access is performed via local
  Python tools against the GitHub REST API.
metadata:
  authors:
    - Volpara Health
  tags:
    - Azure AI AgentServer
    - Microsoft Agent Framework
    - CI/CD
    - Auto-Heal
    - GitHub
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: PROJECT_ENDPOINT
    value: ${PROJECT_ENDPOINT}
  - name: MODEL_DEPLOYMENT_NAME
    value: ${MODEL_DEPLOYMENT_NAME}
  - name: GITHUB_TOKEN
    value: ${GITHUB_TOKEN}
  - name: GITHUB_REPO_OWNER
    value: ${GITHUB_REPO_OWNER}
  - name: GITHUB_REPO_NAME
    value: ${GITHUB_REPO_NAME}
  - name: LOG_LEVEL
    value: ${LOG_LEVEL}
dockerfile_path: ./Dockerfile
resources:
  cpu: '0.5'
  memory: 1.0Gi
